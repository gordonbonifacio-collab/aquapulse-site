<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AquaPulse</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(
        180deg,
        #07131d 0%,
        #0d2233 100%
      );

      color: white;

      font-family:
        Inter,
        Arial,
        sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 720px;

      background: rgba(255,255,255,0.04);

      border: 1px solid rgba(255,255,255,0.08);

      border-radius: 24px;

      padding: 48px;

      backdrop-filter: blur(10px);

      box-shadow:
        0 20px 60px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 20px 0;

      font-size: 56px;
      line-height: 1;

      color: #ffffff;
    }

    .tagline {
      font-size: 22px;
      line-height: 1.5;

      color: #d6e4f0;

      margin-bottom: 28px;
    }

    .body {
      font-size: 18px;
      line-height: 1.8;

      color: #a8bccd;
    }

    .email {
      margin-top: 40px;
      font-size: 16px;
    }

    a {
      color: #53d8ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .card {
        padding: 32px;
      }

      h1 {
        font-size: 42px;
      }

      .tagline {
        font-size: 20px;
      }

      .body {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>AquaPulse</h1>

    <div class="tagline">
      Intelligent aquarium guidance designed to help fishkeepers feel more confident managing tank health, livestock and water quality.
    </div>

    <div class="body">
      AquaPulse combines aquarium tracking, ecosystem insights and AI-powered guidance to support healthier, more stable aquariums.
    </div>

    <div class="email">
      Contact:
      <a href="mailto:valeonlabs@proton.me">
        valeonlabs@proton.me
      </a>
    </div>

  </div>

</body>
</html>
